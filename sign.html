<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sing Up</title>
    <link rel="stylesheet" href="bootstrap-5.0.2-dist/css/bootstrap.min.css">
    <style>
        .yac {
            font-size: 300%;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            color: transparent;
            text-align: center;
            -webkit-text-stroke: 1px black;
            background: url(load.jpeg);
            -webkit-background-clip:  text; 
            background-position: 0 0;
            animation: back 20s linear infinite;
            margin: 42px 0;
        }

        @keyframes back {
            100% {
                background-position: 2000px 0;
            }
        }

        .main {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        .sucol {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }

        .form_div {
            display: flex;
            justify-content: centar;
            align-items: center;
            flex-direction: column;
            width: 100%;
        }

        img {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            filter: blur(4px);
            z-index: -10;
        }

        .in {
            width: 400px;
            border-radius: 10px;
            padding: 8px 5px;
            text-align: center;
        }

        .btt {
            background-color: black;
            color: white;
            border-radius: 20px;
            width: 20%;
            padding: 5px 0;
        }

        @media screen and (max-width:600px) {
            .in {
                width: 200px;
            }
            .btt {
            width: 50%;
        }
        }
    </style>
</head>

<body>
    <img src="images0\blur.jpg">


    <div class="row" style=" width: 100%; margin: 0;">
        <div class="col-lg-6  sucol">
            <div class="form_div">
                <h3 class="yac">Sign up</h3>
                <form action="">
                    <input type="text" placeholder="First Name" class="in" id="fnames"><br><span
                        id="fname_error"></span><br><br>
                    <input type="text" placeholder="Last Name" class="in" id="lnames"><br><span
                        id="lname_error"></span><br><br>
                    <input type="text" placeholder="Email" class="in" id="emails"><br><span id="email_error"></span><br><br>
                    <input type="text" placeholder="Password" class="in" id="pass"><br><span id="pass_error"></span><br><br>
                    <label class="form-check-label" style="color: white; font-size: 18px;">
                        <input class="form-check-input" type="checkbox" name="remember"> Remember me
                    </label>
                </form><br>
                <button class="btt" id="mon" onclick="cal()">Sign Up</button>
            </div>
        </div>
        <div class="col-lg-6 sucol">
            <div class="form_div">
                <h3 class="yac">Sign In</h3>
                <form action="">
                    <input type="text" placeholder="Email" class="in" id="emails2"><br><label
                        id="email_error2"></label><br><br>
                    <input type="text" placeholder="Password" class="in" id="pass2"><br><label
                        id="pass_error2"></label><br><br>
                </form>
                <button class="btt" id="mon" onclick="call()">Sign In</button>
            </div>
        </div>
    </div>
    <script>
        // Sign Up Start
        function cal() {
            fnames = document.getElementById('fnames').value;
            lnames = document.getElementById('lnames').value;
            pasword = document.getElementById('pass').value;
            emails = document.getElementById('emails').value;

            name_chk = /^([a-zA-Z])+$/;
            email_chk = /^([a-zA-Z0-9\-\.]{5,20})+\@([a-zA-Z])+\.([a-zA-Z]{2,4})+$/;

            //                                       F Name
            if (fnames.length > 0) {
                if (name_chk.test(fnames) == true) {
                    document.getElementById("fname_error").innerHTML = '';
                }
                else {
                    document.getElementById("fname_error").innerHTML = 'Only alphabet Allowed';
                    document.getElementById("fname_error").style.color = "red";
                }
            }
            else {
                document.getElementById("fname_error").innerHTML = 'Please Enter Name';
                document.getElementById("fname_error").style.color = "red";

            }

            //                                       L Name
            if (lnames.length > 0) {
                if (name_chk.test(lnames) == true) {
                    document.getElementById("lname_error").innerHTML = '';
                }
                else {
                    document.getElementById("lname_error").innerHTML = 'Only alphabet Allowed';
                    document.getElementById("lname_error").style.color = "red";
                }
            }
            else {
                document.getElementById("lname_error").innerHTML = 'Please Enter Name';
                document.getElementById("lname_error").style.color = "red";

            }
            //                                       Email
            if (emails.length > 0) {
                if (email_chk.test(emails) == true) {
                    document.getElementById("email_error").innerHTML = '';
                }
                else {
                    document.getElementById("email_error").innerHTML = 'Please Enter Valid Email';
                    document.getElementById("email_error").style.color = "red";
                }
            }
            else {
                document.getElementById("email_error").innerHTML = 'Please Enter Email';
                document.getElementById("email_error").style.color = "red";

            }
            //                                       Password
            if (pasword.length > 0) {
                document.getElementById("pass_error").innerHTML = '';
            }
            else {
                document.getElementById("pass_error").innerHTML = 'Please Enter Password';
                document.getElementById("pass_error").style.color = "red";

            }

            var fnames_error1 = document.getElementById('fname_error').innerHTML;
            var lnames_error1 = document.getElementById('lname_error').innerHTML;
            var emails_error1 = document.getElementById('email_error').innerHTML;
            var pass_error1 = document.getElementById('pass_error').innerHTML;

            if (fnames_error1.length == 0 && lnames_error1.length == 0 && emails_error1.length == 0 && pass_error1.length == 0) {
                document.getElementById("fnames").value = "";
                document.getElementById("lnames").value = "";
                document.getElementById("emails").value = "";
                document.getElementById("pass").value = "";
                alert("Congratulation! Your Sign Up Step is Completed 😃")
            }
            else { }

            sessionStorage.setItem("First Name", fnames);
            sessionStorage.setItem("Last Name", lnames);
            sessionStorage.setItem("ID", emails);
            sessionStorage.setItem("Pass", pasword);

        }

        // Sign Up End 


        // Sign IN Start 
        function call() {

            ssfn = sessionStorage.getItem("First Name");
            ssln = sessionStorage.getItem("Last Name");
            ssid = sessionStorage.getItem("ID");
            sspass = sessionStorage.getItem("Pass");

            pass = document.getElementById('pass2').value;
            emails = document.getElementById('emails2').value;

            age_chk = /^([0-9]{1,3})+$/;
            email_chk = /^([a-zA-Z0-9\-\.]{5,20})+\@([a-zA-Z])+\.([a-zA-Z]{2,4})+$/;


            if (emails == ssid && pass == sspass && emails.length > 0 && pass.length > 0) {
                alert("Welcome " + ssfn + " " + ssln + " 🙂");
                document.getElementById("emails2").value = '';
                document.getElementById("pass2").value = '';
                document.getElementById("email_error2").innerHTML = '';
                document.getElementById("pass_error2").innerHTML = '';
            }
            else if (emails != ssid && pass == sspass) {
                document.getElementById("email_error2").innerHTML = 'Your Email Does Not Matched';
                document.getElementById("email_error2").style.color = 'red';
                document.getElementById("pass_error2").innerHTML = '';
            }
            else if (emails == ssid && pass != sspass) {
                document.getElementById("pass_error2").innerHTML = 'Your Password Does Not Matched';
                document.getElementById("pass_error2").style.color = 'red';
                document.getElementById("email_error2").innerHTML = '';
            }
            else if (emails != ssid && pass != sspass) {
                document.getElementById("email_error2").innerHTML = 'Your Email Does Not Matched';
                document.getElementById("email_error2").style.color = 'red';
                document.getElementById("pass_error2").innerHTML = 'Your Password Does Not Matched';
                document.getElementById("pass_error2").style.color = 'red';
            }
            else if (emails.length == 0 && pass.length == 0){
                document.getElementById("email_error2").innerHTML = 'Please Enter Email';
                document.getElementById("email_error2").style.color = 'red';
                document.getElementById("pass_error2").innerHTML = 'Plese Enter Password';
                document.getElementById("pass_error2").style.color = 'red';
            }

        }
                                                    // Sign IN End
    </script>

    <script src="bootstrap-5.0.2-dist/js/bootstrap.min.js"></script>
</body>

</html>
